<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      text-align: center;
    }

    h1 {
      color: #e94560;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }

    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 1.5rem;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid #0f3460;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }

    .mode-btn {
      background: #16213e;
      color: #a8a8b3;
      border: none;
      padding: 0.5rem 1.4rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.5px;
    }

    .mode-btn.active {
      background: #0f3460;
      color: #fff;
    }

    .mode-btn:hover:not(.active) {
      background: #1a2a4a;
      color: #ccc;
    }

    .status {
      color: #a8a8b3;
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
    }

    .status span {
      color: #e94560;
      font-weight: bold;
    }

    .status span.o {
      color: #4fc3f7;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
      margin: 0 auto 1.5rem;
      width: fit-content;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      color: #e94560;
      user-select: none;
    }

    .cell.o {
      color: #4fc3f7;
    }

    .cell:hover:not(.taken):not(.blocked) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.taken {
      cursor: not-allowed;
    }

    .cell.blocked {
      cursor: not-allowed;
    }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease;
    }

    .cell.o.win {
      border-color: #4fc3f7;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .score-board {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .score-card {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      padding: 0.6rem 1.2rem;
      min-width: 80px;
    }

    .score-card .label {
      color: #a8a8b3;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-card .value {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-card.x .value { color: #e94560; }
    .score-card.draw .value { color: #a8a8b3; }
    .score-card.o .value { color: #4fc3f7; }

    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 0.7rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 1px;
    }

    .btn:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TIC TAC TOE</h1>

    <div class="mode-toggle">
      <button class="mode-btn active" id="btn2P">2 Pemain</button>
      <button class="mode-btn" id="btnAI">vs AI</button>
    </div>

    <div class="score-board">
      <div class="score-card x">
        <div class="label" id="labelX">Pemain X</div>
        <div class="value" id="scoreX">0</div>
      </div>
      <div class="score-card draw">
        <div class="label">Seri</div>
        <div class="value" id="scoreDraw">0</div>
      </div>
      <div class="score-card o">
        <div class="label" id="labelO">Pemain O</div>
        <div class="value" id="scoreO">0</div>
      </div>
    </div>

    <div class="status" id="status">Giliran <span>X</span></div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <button class="btn" id="resetBtn">Main Lagi</button>
  </div>

  <script>
    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('resetBtn');
    const scoreX = document.getElementById('scoreX');
    const scoreO = document.getElementById('scoreO');
    const scoreDraw = document.getElementById('scoreDraw');
    const labelX = document.getElementById('labelX');
    const labelO = document.getElementById('labelO');
    const btn2P = document.getElementById('btn2P');
    const btnAI = document.getElementById('btnAI');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill('');
    let current = 'X';
    let gameOver = false;
    let aiThinking = false;
    let vsAI = false;
    let scores = { X: 0, O: 0, draw: 0 };

    // --- Mode toggle ---
    btn2P.addEventListener('click', () => {
      if (vsAI) { vsAI = false; btn2P.classList.add('active'); btnAI.classList.remove('active'); updateLabels(); reset(); }
    });
    btnAI.addEventListener('click', () => {
      if (!vsAI) { vsAI = true; btnAI.classList.add('active'); btn2P.classList.remove('active'); updateLabels(); reset(); }
    });

    function updateLabels() {
      labelX.textContent = 'Pemain X';
      labelO.textContent = vsAI ? 'AI' : 'Pemain O';
    }

    // --- Win check (works on any board array) ---
    function checkWinnerOn(b) {
      for (const [a, i, c] of WINS) {
        if (b[a] && b[a] === b[i] && b[a] === b[c]) return { winner: b[a], line: [a, i, c] };
      }
      if (b.every(v => v !== '')) return { winner: 'draw' };
      return null;
    }

    // --- Minimax ---
    function minimax(b, isMaximizing, depth) {
      const result = checkWinnerOn(b);
      if (result) {
        if (result.winner === 'O') return 10 - depth;
        if (result.winner === 'X') return depth - 10;
        return 0;
      }
      if (isMaximizing) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i] = 'O'; best = Math.max(best, minimax(b, false, depth + 1)); b[i] = ''; }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i] = 'X'; best = Math.min(best, minimax(b, true, depth + 1)); b[i] = ''; }
        }
        return best;
      }
    }

    function getBestMove() {
      let best = -Infinity, bestMove = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const score = minimax(board, false, 0);
          board[i] = '';
          if (score > best) { best = score; bestMove = i; }
        }
      }
      return bestMove;
    }

    // --- Place a mark and check result ---
    function placeMove(idx, player) {
      board[idx] = player;
      const cell = cells[idx];
      cell.textContent = player;
      cell.classList.add('taken', player.toLowerCase());

      const result = checkWinnerOn(board);
      if (result) {
        gameOver = true;
        if (result.winner === 'draw') {
          scores.draw++;
          scoreDraw.textContent = scores.draw;
          statusEl.innerHTML = 'Seri!';
        } else {
          scores[result.winner]++;
          if (result.winner === 'X') scoreX.textContent = scores.X;
          else scoreO.textContent = scores.O;
          result.line.forEach(i => cells[i].classList.add('win'));
          const label = vsAI && result.winner === 'O' ? 'AI' : `Pemain <span>${result.winner}</span>`;
          statusEl.innerHTML = `${label} menang!`;
        }
        return true;
      }
      return false;
    }

    // --- AI turn ---
    function doAIMove() {
      aiThinking = true;
      cells.forEach(c => c.classList.add('blocked'));
      statusEl.innerHTML = `AI sedang berpikir...`;

      setTimeout(() => {
        const move = getBestMove();
        cells.forEach(c => c.classList.remove('blocked'));
        aiThinking = false;

        if (move === -1) return;
        const finished = placeMove(move, 'O');
        if (!finished) {
          current = 'X';
          statusEl.innerHTML = `Giliran <span>X</span>`;
        }
      }, 350);
    }

    // --- Human click ---
    function handleClick(e) {
      const idx = +e.target.dataset.index;
      if (gameOver || aiThinking || board[idx]) return;

      const finished = placeMove(idx, current);
      if (finished) return;

      if (vsAI) {
        doAIMove();
      } else {
        current = current === 'X' ? 'O' : 'X';
        statusEl.innerHTML = `Giliran <span class="${current.toLowerCase()}">${current}</span>`;
      }
    }

    function reset() {
      board.fill('');
      current = 'X';
      gameOver = false;
      aiThinking = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      statusEl.innerHTML = `Giliran <span>X</span>`;
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    resetBtn.addEventListener('click', reset);
  </script>
</body>
</html>
